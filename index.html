<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CULT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <a href="#" class="logo" aria-label="Logo">
            CULT
        </a>

        <form class="campo-busca" role="search" aria-label="Busca">
            <label for="busca" class="sr-only">Buscar</label>
            <input id="busca" type="search" placeholder="Titulos, pessoas e generos" />
            <button type="submit" aria-label="Buscar">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M10 4a6 6 0 1 0 3.86 10.59l4.28 4.28a1 1 0 0 0 1.41-1.41l-4.28-4.28A6 6 0 0 0 10 4Zm-4 6a4 4 0 1 1 8 0 4 4 0 0 1-8 0Z"></path>
                </svg>
                <span class="sr-only">Buscar</span>
            </button>
        </form>

        <button class="usuario" type="button" aria-label="Perfil do usuario">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5Zm0 2c-4.42 0-8 2.24-8 5v1h16v-1c0-2.76-3.58-5-8-5Z"></path>
            </svg>
        </button>
    </header>

    <main class="conteudo">
        <section class="sessao-filmes" aria-label="Catalogo de filmes">
            <div class="sessao-topo">
            </div>

            <div class="lista-filmes" role="list">
                <article class="card-filme" role="listitem">
                    <img src="images/a casa das sete mulheres.jpg" alt="A Casa das Sete Mulheres" loading="lazy">
                    <h3>A Casa das Sete Mulheres</h3>
                </article>
                <article class="card-filme" role="listitem">
                    <img src="images/amar e para os fortes.jpg" alt="Amar e para os Fortes" loading="lazy">
                    <h3>Amar e para os Fortes</h3>
                </article>
                <article class="card-filme" role="listitem">
                    <img src="images/amarElo.jfif" alt="AmarElo" loading="lazy">
                    <h3>AmarElo</h3>
                </article>
                <article class="card-filme" role="listitem">
                    <img src="images/bacurau.jpg" alt="Bacurau" loading="lazy">
                    <h3>Bacurau</h3>
                </article>
                <article class="card-filme" role="listitem">
                    <img src="images/carandiru.jpg" alt="Carandiru" loading="lazy">
                    <h3>Carandiru</h3>
                </article>
                <article class="card-filme" role="listitem">
                    <img src="images/central do brasil.jpg" alt="Central do Brasil" loading="lazy">
                    <h3>Central do Brasil</h3>
                </article>
                <article class="card-filme" role="listitem">
                    <img src="images/chernobyl.jpg" alt="Chernobyl" loading="lazy">
                    <h3>Chernobyl</h3>
                </article>
                <article class="card-filme" role="listitem">
                    <img src="images/CidadedeDeus.jpg" alt="Cidade de Deus" loading="lazy">
                    <h3>Cidade de Deus</h3>
                </article>
                <article class="card-filme" role="listitem">
                    <img src="images/emergencia radioativa.webp" alt="Emergencia Radioativa" loading="lazy">
                    <h3>Emergencia Radioativa</h3>
                </article>
                <article class="card-filme" role="listitem">
                    <img src="images/hoje eu quero voltar sozinho.jpeg" alt="Hoje Eu Quero Voltar Sozinho" loading="lazy">
                    <h3>Hoje Eu Quero Voltar Sozinho</h3>
                </article>
                <article class="card-filme" role="listitem">
                    <img src="images/irmaos de guerra.jpg" alt="Irmaos de Guerra" loading="lazy">
                    <h3>Irmaos de Guerra</h3>
                </article>
                <article class="card-filme" role="listitem">
                    <img src="images/o auto da compadecida.jpg" alt="O Auto da Compadecida" loading="lazy">
                    <h3>O Auto da Compadecida</h3>
                </article>
                <article class="card-filme" role="listitem">
                    <img src="images/o pagador de promessa.jpg" alt="O Pagador de Promessa" loading="lazy">
                    <h3>O Pagador de Promessa</h3>
                </article>
                <article class="card-filme" role="listitem">
                    <img src="images/que horas ela volta.jpg" alt="Que Horas Ela Volta" loading="lazy">
                    <h3>Que Horas Ela Volta</h3>
                </article>
                <article class="card-filme" role="listitem">
                    <img src="images/terrra em transe.jfif" alt="Terra em Transe" loading="lazy">
                    <h3>Terra em Transe</h3>
                </article>
                <article class="card-filme" role="listitem">
                    <img src="images/tropa de elite.jpg" alt="Tropa de Elite" loading="lazy">
                    <h3>Tropa de Elite</h3>
                </article>
            </div>
        </section>
    </main>
</body>
</html>
